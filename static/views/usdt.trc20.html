<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
    <meta name="renderer" content="webkit">
    <meta name="HandheldFriendly" content="True"/>
    <meta name="MobileOptimized" content="320"/>
    <meta name="format-detection" content="telephone=no"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
    <link rel="shortcut icon" href="/img/tether.svg"/>
    <link href="/css/main.min.css" rel="stylesheet"/>
    <title>USDT Pay</title>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/jquery.qrcode_1.0.min.js"></script>
    <script src="/js/clipboard.min.js"></script>
    <script src="/js/layer.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="icon">
            <img class="logo" src="/img/tether.svg" alt="logo">
        </div>
        <h1 class="amount parse-amount" data-clipboard-text="{{.amount}}" id="usdt">
          {{.amount}} <span>USDT</span>
        </h1>
        <label>Top Up Network: &nbsp;&nbsp;&nbsp; <b>TRC20</b><br/></label>
        <label>Double-check the top up network and amount to avoid losing money!</label>
    </div>
    <div class="content">
        <div class="section">
            <div class="main">
                <div class="qr-image" id="qrcode"></div>
            </div>
            <div class="timer">
                <ul class="downcount">
                    <li>
                        <span class="hours">00</span>
                    </li>
                    <li class="seperator">:</li>
                    <li>
                        <span class="minutes">00</span>
                    </li>
                    <li class="seperator">:</li>
                    <li>
                        <span class="seconds">00</span>
                    </li>
                </ul>
            </div>
            <div class="title">
              <h1>
                <span>Scan the QR code or copy the wallet address and amount to transfer</span>
              </h1>
            </div>
            <div class="address parse-action" data-clipboard-text="{{.address}}" id="address">
                {{.address}}
            </div>
            <div class="title">
              <h1>
                <span>"The payment amount must be <b style="color: red">{{.amount}}</b>. Please pay in the countdown"</span>
              </h1>
            </div>
        </div>
    </div>
    <div class="footer">
        <p></p>
    </div>
</div>
<script>
    let expire = {{.expire}};
    let startTime = Date.now();

    // 支付时间倒计时
    function clock() {
        let now = Date.now();
        let elapsed = Math.floor((now - startTime) / 1000);  // 计算已过去的秒数
        let seconds = expire - elapsed;  // 计算剩余秒数

        let minute = Math.floor(seconds / 60);
        let hour = Math.floor(minute / 60);

        if (seconds <= 0) {
            //return layer.alert("支付超时，请重新发起支付！", {icon: 5});
            return layer.alert("Payment has timed out. Please try making the payment again!", {icon: 5});
        }

        $('.hours').text(hour.toString().padStart(2, '0'));
        $('.minutes').text(minute.toString().padStart(2, '0'));
        $('.seconds').text((seconds % 60).toString().padStart(2, '0'));

        setTimeout(clock, 1000);
    }

    function checkStatus() {
        $.ajax({
            type: "GET",
            dataType: "json",
            url: "/pay/check-status/{{.trade_id}}",
            success: function (data) {
                if (data.status === 1) {
                    // 等待支付
                    return setTimeout(checkStatus, 5000);
                }
                if (data.status === 2) {  // 支付成功
                    //layer.msg('支付成功，正在跳转中...', {icon: 16, shade: 0.01, time: 20000});
                    layer.msg('Payment successful! Redirecting ...', {icon: 16, shade: 0.01, time: 20000});

                    return window.location.href = data.return_url;
                }
                if (data.status === 3) {

                    //return layer.alert("支付超时，请重新发起支付！", {icon: 5, title: "❌ 支付超时"});
                    return layer.alert("Payment has timed out. Please try making the payment again!", {icon: 5, title: "❌ Payment timed out"});
                }
            }
        });
    }

    $(function () {
        $('#qrcode').qrcode({
            text: "{{.address}}",
            width: 230,
            height: 230,
            foreground: "#000000",
            background: "#ffffff",
            typeNumber: -1
        });

        (new ClipboardJS('#usdt')).on('success', function (e) {
            //return layer.msg('金额复制成功');
            return layer.msg('Amount copied!');
        });
        (new ClipboardJS('#address')).on('success', function (e) {
            //layer.msg('地址复制成功');
            layer.msg('Wallet address copied!');
        });

        setTimeout(clock, 1000);
        setTimeout(checkStatus, 2000);
    });
</script>
</body>
</html>
